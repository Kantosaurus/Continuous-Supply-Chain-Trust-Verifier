# =============================================================================
# Docker Compose Override for Local Development
# =============================================================================
# This file is automatically loaded with docker-compose.yml
# It provides development-friendly defaults.
#
# Usage:
#   docker-compose up -d
# =============================================================================

services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: sctv_dev

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgres://sctv:sctv_dev@postgres:5432/sctv
      SCTV_JWT_SECRET: development-secret-not-for-production
      SCTV_LOG_FORMAT: pretty
      RUST_LOG: debug,sctv_api=debug,tower_http=debug,sqlx=warn
    volumes:
      # Mount migrations for development
      - ./migrations:/home/sctv/migrations:ro
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgres://sctv:sctv_dev@postgres:5432/sctv
      SCTV_WORKER_COUNT: "2"
      SCTV_LOG_FORMAT: pretty
      RUST_LOG: debug,sctv_worker=debug
